name: Build standalone binaries

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: fusionctl-linux-x64
            executable: dist/fusionctl/fusionctl
            archive: fusionctl-linux-x64.tar.gz
          - os: windows-latest
            artifact_name: fusionctl-windows-x64
            executable: dist/fusionctl/fusionctl.exe
            archive: fusionctl-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: poetry

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run poe test

      - name: Run lint
        run: poetry run poe lint

      - name: Run typecheck
        run: poetry run poe typecheck

      - name: Build standalone directory
        run: poetry run python scripts/build_standalone.py --onedir --name fusionctl

      - name: Smoke test executable
        run: python -c "import subprocess; subprocess.run([r'${{ matrix.executable }}', '--version'], check=True)"

      - name: Archive Linux artifact
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.archive }} -C dist fusionctl

      - name: Archive Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/fusionctl -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
